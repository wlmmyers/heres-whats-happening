services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hwh_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db-init.sh:/docker-entrypoint-initdb.d/db-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 2s
      timeout: 5s
      retries: 20

  elasticmq:
    image: softwaremill/elasticmq-native:1.6.7
    container_name: hwh_elasticmq
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./scripts/elasticmq.conf:/opt/elasticmq.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9324/?Action=ListQueues || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    platform: linux/amd64
    container_name: hwh_tei
    command: ["--model-id", "BAAI/bge-small-en-v1.5"]
    ports:
      - "8081:80"
    volumes:
      - ./.tei-cache:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/80' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
