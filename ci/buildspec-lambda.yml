version: 0.2

# Builds the email-parser Lambda container image and pushes it to its ECR repo,
# then points the function at the new image. Wire to a CodeBuild project with env:
# AWS_ACCOUNT_ID, AWS_REGION, LAMBDA_ECR_REPO, FUNCTION_NAME, DOCKERHUB_USER, DOCKERHUB_TOKEN.

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - corepack enable

  build:
    commands:
      # LAMBDA_ECR_REPO must be the repo NAME only (e.g. hwh-email-parser), not the full
      # registry URL. The terraform output `email_parser_ecr_repo` emits the full URL;
      # the CodeBuild project should pass just the repository name here.
      - SHORT_SHA=$(echo "${CODEBUILD_RESOLVED_SOURCE_VERSION}" | cut -c1-7)
      - IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${LAMBDA_ECR_REPO}:${SHORT_SHA}"
      - echo "IMAGE_URI=${IMAGE_URI}"
      - echo "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USER}" --password-stdin
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      # Lambda unit + contract tests (the two ElasticMQ-dependent specs — sqs.test.ts
      # and handler.e2e.test.ts — are excluded here; they run in local dev).
      - cd lambda/email-parser
      - pnpm install --frozen-lockfile
      - pnpm typecheck
      - pnpm vitest run src/schema.test.ts src/hash.test.ts src/map.test.ts src/email.test.ts src/extractor.test.ts src/handler.test.ts
      - cd ../..

      - docker build -t "${IMAGE_URI}" lambda/email-parser
      - docker push "${IMAGE_URI}"
      - aws lambda update-function-code --function-name "${FUNCTION_NAME}" --image-uri "${IMAGE_URI}" --region "${AWS_REGION}"
      - echo "${IMAGE_URI}" > lambda_image_uri.txt

artifacts:
  files:
    - lambda_image_uri.txt
