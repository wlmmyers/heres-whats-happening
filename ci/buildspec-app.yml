version: 0.2

# Dual-phase buildspec: same file used by both app-build and app-deploy
# CodeBuild projects. The APP_PHASE env var (set in the CodeBuild project
# config) selects which logic runs.

phases:
  install:
    runtime-versions:
      golang: 1.24
    commands:
      - go version

  pre_build:
    commands:
      - echo "Phase = ${APP_PHASE}"

  build:
    commands:
      # All variables and docker login go here — CodeBuild phases run in
      # separate shells, so variables set in pre_build do NOT carry over.
      - SHORT_SHA=$(echo "${CODEBUILD_RESOLVED_SOURCE_VERSION}" | cut -c1-7)
      - IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${SHORT_SHA}"
      - echo "IMAGE_URI=${IMAGE_URI}"
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      # BUILD PHASE — only when APP_PHASE=build
      - |
        if [ "${APP_PHASE}" = "build" ]; then
          # Authenticate to Docker Hub before any pull (compose images, the
          # golang build stage, and the BuildKit frontend) so we use our own
          # per-account rate limit instead of the shared anonymous per-IP one.
          echo "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USER}" --password-stdin

          # Integration tests need Postgres (localhost:5432, db appdb_test) and
          # ElasticMQ (localhost:9324). Reuse the docker-compose definitions used
          # for local dev. TEI is intentionally excluded — matcher tests use a
          # fakeEmbedder, so the heavy embeddings image is never needed in CI.
          echo "=== Starting test dependencies ==="
          docker compose up -d --wait postgres elasticmq

          echo "=== Running tests ==="
          # Capture rc via || so a non-zero exit is "handled" (won't trip set -e
          # before teardown), then fail explicitly after stopping the containers.
          # -p 1: integration tests share one appdb_test DB and truncate all
          # tables between tests (see internal/testdb), so package test binaries
          # MUST run serially — matches the Makefile `test` target.
          go test -p 1 ./... -count=1 && TEST_RC=0 || TEST_RC=$?

          echo "=== Stopping test dependencies ==="
          docker compose down -v

          if [ "$TEST_RC" -ne 0 ]; then echo "tests failed" && exit 1; fi

          echo "=== Building Docker image ==="
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "${IMAGE_URI}" > image_uri.txt
        fi

      # DEPLOY PHASE — only when APP_PHASE=deploy
      - |
        if [ "${APP_PHASE}" = "deploy" ]; then
          echo "=== Deploying ${IMAGE_URI} ==="
          SERVICE_NAME="${APP_NAME_PREFIX}-api"
          CLUSTER_NAME="${APP_NAME_PREFIX}-cluster"
          # All task-def families managed by Plan 8.
          FAMILIES="${APP_NAME_PREFIX}-api ${APP_NAME_PREFIX}-scrape-events-ticketmaster ${APP_NAME_PREFIX}-scrape-spotify ${APP_NAME_PREFIX}-match"

          if aws ecs describe-services --cluster "${CLUSTER_NAME}" --services "${SERVICE_NAME}" --region "${AWS_REGION}" 2>/dev/null | grep -q '"status": "ACTIVE"'; then
            # Register a new revision per family, image swapped to the freshly-built one.
            for FAMILY in $FAMILIES; do
              echo "--- registering new revision for $FAMILY ---"
              CURRENT_ARN=$(aws ecs describe-task-definition --task-definition "$FAMILY" --region "${AWS_REGION}" --query 'taskDefinition.taskDefinitionArn' --output text)
              aws ecs describe-task-definition --task-definition "$CURRENT_ARN" --region "${AWS_REGION}" --query 'taskDefinition' > taskdef.json
              jq --arg img "${IMAGE_URI}" '
                .containerDefinitions[0].image = $img |
                del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
              ' taskdef.json > taskdef.new.json
              NEW_ARN=$(aws ecs register-task-definition --cli-input-json file://taskdef.new.json --region "${AWS_REGION}" --query 'taskDefinition.taskDefinitionArn' --output text)
              echo "registered $NEW_ARN"

              # api gets a rolling deploy via update-service. Others rely on EventBridge
              # picking up :LATEST next firing.
              if [ "$FAMILY" = "${APP_NAME_PREFIX}-api" ]; then
                aws ecs update-service --cluster "${CLUSTER_NAME}" --service "${SERVICE_NAME}" --task-definition "$NEW_ARN" --region "${AWS_REGION}" > /dev/null
                echo "deployed $NEW_ARN to $SERVICE_NAME"
              fi
            done
          else
            echo "Service ${SERVICE_NAME} not found in cluster ${CLUSTER_NAME} (Plan 8 not yet applied). Image is in ECR; skipping deploy."
          fi
        fi

artifacts:
  files:
    - image_uri.txt
  discard-paths: yes
