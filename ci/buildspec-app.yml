version: 0.2

# Dual-phase buildspec: same file used by both app-build and app-deploy
# CodeBuild projects. The APP_PHASE env var (set in the CodeBuild project
# config) selects which logic runs.

phases:
  install:
    runtime-versions:
      golang: 1.24
    commands:
      - go version

  pre_build:
    commands:
      - echo "Phase = ${APP_PHASE}"

  build:
    commands:
      # All variables and docker login go here — CodeBuild phases run in
      # separate shells, so variables set in pre_build do NOT carry over.
      - SHORT_SHA=$(echo "${CODEBUILD_RESOLVED_SOURCE_VERSION}" | cut -c1-7)
      - IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${SHORT_SHA}"
      - echo "IMAGE_URI=${IMAGE_URI}"
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      # BUILD PHASE — only when APP_PHASE=build
      - |
        if [ "${APP_PHASE}" = "build" ]; then
          # Authenticate to Docker Hub before any pull (compose images, the
          # golang build stage, and the BuildKit frontend) so we use our own
          # per-account rate limit instead of the shared anonymous per-IP one.
          echo "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USER}" --password-stdin

          # Integration tests need Postgres (localhost:5432, db appdb_test) and
          # ElasticMQ (localhost:9324). Reuse the docker-compose definitions used
          # for local dev. TEI is intentionally excluded — matcher tests use a
          # fakeEmbedder, so the heavy embeddings image is never needed in CI.
          echo "=== Starting test dependencies ==="
          docker compose up -d --wait postgres elasticmq

          echo "=== Running tests ==="
          # Capture rc via || so a non-zero exit is "handled" (won't trip set -e
          # before teardown), then fail explicitly after stopping the containers.
          # -p 1: integration tests share one appdb_test DB and truncate all
          # tables between tests (see internal/testdb), so package test binaries
          # MUST run serially — matches the Makefile `test` target.
          go test -p 1 ./... -count=1 && TEST_RC=0 || TEST_RC=$?

          echo "=== Stopping test dependencies ==="
          docker compose down -v

          if [ "$TEST_RC" -ne 0 ]; then echo "tests failed" && exit 1; fi

          echo "=== Building Docker image ==="
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "${IMAGE_URI}" > image_uri.txt
        fi

      # DEPLOY PHASE — only when APP_PHASE=deploy
      - |
        if [ "${APP_PHASE}" = "deploy" ]; then
          echo "=== Deploying ${IMAGE_URI} ==="
          SERVICE_NAME="${APP_NAME_PREFIX}-api"
          CLUSTER_NAME="${APP_NAME_PREFIX}-cluster"
          # All task-def families managed by Plan 8.
          FAMILIES="${APP_NAME_PREFIX}-api ${APP_NAME_PREFIX}-scrape-events-ticketmaster ${APP_NAME_PREFIX}-scrape-spotify ${APP_NAME_PREFIX}-match"

          if aws ecs describe-services --cluster "${CLUSTER_NAME}" --services "${SERVICE_NAME}" --region "${AWS_REGION}" 2>/dev/null | grep -q '"status": "ACTIVE"'; then
            # Register a new revision per family, image swapped to the freshly-built one.
            # The api revision ARN is captured (not deployed yet): migrations run against
            # it first, and only on success does the service roll forward — so new code
            # never serves against an un-migrated schema.
            API_NEW_ARN=""
            for FAMILY in $FAMILIES; do
              echo "--- registering new revision for $FAMILY ---"
              CURRENT_ARN=$(aws ecs describe-task-definition --task-definition "$FAMILY" --region "${AWS_REGION}" --query 'taskDefinition.taskDefinitionArn' --output text)
              aws ecs describe-task-definition --task-definition "$CURRENT_ARN" --region "${AWS_REGION}" --query 'taskDefinition' > taskdef.json
              jq --arg img "${IMAGE_URI}" '
                .containerDefinitions[0].image = $img |
                del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
              ' taskdef.json > taskdef.new.json
              NEW_ARN=$(aws ecs register-task-definition --cli-input-json file://taskdef.new.json --region "${AWS_REGION}" --query 'taskDefinition.taskDefinitionArn' --output text)
              echo "registered $NEW_ARN"

              # api gets a rolling deploy via update-service (after migrations). Others rely
              # on EventBridge picking up :LATEST next firing.
              if [ "$FAMILY" = "${APP_NAME_PREFIX}-api" ]; then
                API_NEW_ARN="$NEW_ARN"
              fi
            done

            # --- Run DB migrations on the new image, before rolling the service ----------
            # RDS is private, so migrations run as a one-off Fargate task inside the VPC,
            # reusing the freshly-registered api revision with its command overridden to
            # `migrate` (the same binary/codepath as `make migrate-prod`). Idempotent and
            # tracked in schema_migrations, so this is a no-op when nothing is pending.
            echo "=== Running DB migrations (one-off task on $API_NEW_ARN) ==="
            SUBNETS=$(aws ec2 describe-subnets --region "${AWS_REGION}" \
              --filters "Name=tag:Name,Values=${APP_NAME_PREFIX}-public-*" \
              --query 'Subnets[].SubnetId' --output text | tr '\t' ',')
            SG=$(aws ec2 describe-security-groups --region "${AWS_REGION}" \
              --filters "Name=group-name,Values=${APP_NAME_PREFIX}-task-runner" \
              --query 'SecurityGroups[0].GroupId' --output text)
            NETCFG="awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SG}],assignPublicIp=ENABLED}"
            MIGRATE_TASK_ARN=$(aws ecs run-task --region "${AWS_REGION}" \
              --cluster "${CLUSTER_NAME}" --launch-type FARGATE --task-definition "$API_NEW_ARN" \
              --started-by codebuild-migrate \
              --network-configuration "$NETCFG" \
              --overrides '{"containerOverrides":[{"name":"api","command":["migrate"]}]}' \
              --query 'tasks[0].taskArn' --output text)
            if [ -z "$MIGRATE_TASK_ARN" ] || [ "$MIGRATE_TASK_ARN" = "None" ]; then
              echo "migrate: run-task did not return a task ARN" && exit 1
            fi
            echo "migrate task: $MIGRATE_TASK_ARN — waiting for it to stop..."
            aws ecs wait tasks-stopped --cluster "${CLUSTER_NAME}" --tasks "$MIGRATE_TASK_ARN" --region "${AWS_REGION}"
            MIGRATE_EXIT=$(aws ecs describe-tasks --cluster "${CLUSTER_NAME}" --tasks "$MIGRATE_TASK_ARN" --region "${AWS_REGION}" \
              --query 'tasks[0].containers[0].exitCode' --output text)
            MIGRATE_REASON=$(aws ecs describe-tasks --cluster "${CLUSTER_NAME}" --tasks "$MIGRATE_TASK_ARN" --region "${AWS_REGION}" \
              --query 'tasks[0].stoppedReason' --output text)
            echo "migrate task stopped: exitCode=$MIGRATE_EXIT reason=$MIGRATE_REASON"
            if [ "$MIGRATE_EXIT" != "0" ]; then
              echo "migrations failed (exitCode=$MIGRATE_EXIT) — aborting deploy before the service rolls forward"
              # Surface the migration error directly in the build log. The awslogs stream
              # is <stream-prefix>/<container>/<task-id> = api/api/<task-id>.
              MIGRATE_TASK_ID="${MIGRATE_TASK_ARN##*/}"
              echo "---- migrate task logs (/aws/ecs/${APP_NAME_PREFIX}/api : api/api/${MIGRATE_TASK_ID}) ----"
              aws logs tail "/aws/ecs/${APP_NAME_PREFIX}/api" --region "${AWS_REGION}" \
                --log-stream-names "api/api/${MIGRATE_TASK_ID}" --since 1h --format short \
                || echo "(no logs retrieved — task may have failed before the container started; see stoppedReason above)"
              exit 1
            fi

            # --- Migrations succeeded: roll the api service onto the new revision --------
            aws ecs update-service --cluster "${CLUSTER_NAME}" --service "${SERVICE_NAME}" --task-definition "$API_NEW_ARN" --region "${AWS_REGION}" > /dev/null
            echo "deployed $API_NEW_ARN to $SERVICE_NAME"
          else
            echo "Service ${SERVICE_NAME} not found in cluster ${CLUSTER_NAME} (Plan 8 not yet applied). Image is in ECR; skipping deploy."
          fi
        fi

artifacts:
  files:
    - image_uri.txt
  discard-paths: yes
